name: Daily Morning Brief

on:
  schedule:
    - cron: '0 0 * * *' # UTC 기준 00:00 (한국 시간 오전 9시)
  workflow_dispatch: # 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install edge-tts google-generativeai python-telegram-bot notion-client pydub
          sudo apt-get install ffmpeg # 오디오 합치기용

      - name: Run Briefing
        env:
          GEMINI_API: ${{ secrets.GEMINI_API }}
          # 여기에 각종 API 키들을 등록
        run: python main.py
